name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
      - name: Format check
        run: cargo fmt --all --check
      - name: Clippy (all features)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Test (all features)
        run: cargo test --workspace --all-features

  wasm:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-wasm-${{ hashFiles('**/Cargo.lock') }}
      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
      - name: Build wasm
        run: wasm-pack build crates/wasm --target web --out-dir pkg
      - name: Check gzipped size (target <= 5 MB)
        run: |
          bytes=$(gzip -c crates/wasm/pkg/bitvanes_wasm_bg.wasm | wc -c)
          echo "Gzipped wasm size: $bytes bytes"
          if [ "$bytes" -gt 5242880 ]; then
            echo "::error::wasm bundle exceeds 5 MB ($bytes bytes)"
            exit 1
          fi
